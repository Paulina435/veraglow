<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito | Vera Glow</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>


<body>


<div class="top-bar">

🚚 Envíos a México | 💬 Atención personalizada | ✨ Productos seleccionados

</div>



<header>


<div class="logo">

<img src="img/logo/vera-glow-logo.png" alt="Vera Glow">

</div>


<nav>

<a href="index.html">
Inicio
</a>

<a href="index.html#productos">
Productos
</a>

<a href="index.html#contacto">
Contacto
</a>

</nav>



<button class="carrito-btn">

🛒 Carrito <span id="contadorCarrito">(0)</span>

</button>


</header>





<section class="carrito-pagina">


<h1>
Tu carrito 🛒
</h1>



<div id="contenidoCarrito"></div>

<!-- Formulario de Envío y Botón de Pago -->
<div class="datos-envio-contenedor" style="max-width: 450px; margin: 30px auto; text-align: left; background: #fffafc; padding: 25px; border-radius: 15px; border: 1px solid #f3e5eb; font-family: 'Poppins', sans-serif;">
  <h3 style="color: #4a3b40; margin-top: 0; margin-bottom: 15px; font-size: 1.2rem;">📍 Datos de Envío</h3>
  
  <div style="margin-bottom: 12px;">
    <label for="nombre-cliente" style="display: block; margin-bottom: 5px; color: #7d6870; font-size: 0.9rem;">Nombre Completo:</label>
    <input type="text" id="nombre-cliente" placeholder="Ej. María López" style="width: 100%; padding: 10px; border: 1px solid #e2d1d8; border-radius: 8px; box-sizing: border-box; outline: none;">
  </div>

  <div style="margin-bottom: 12px;">
    <label for="telefono-cliente" style="display: block; margin-bottom: 5px; color: #7d6870; font-size: 0.9rem;">Teléfono / WhatsApp:</label>
    <input type="tel" id="telefono-cliente" placeholder="Ej. 5512345678" style="width: 100%; padding: 10px; border: 1px solid #e2d1d8; border-radius: 8px; box-sizing: border-box; outline: none;">
  </div>

  <div style="margin-bottom: 20px;">
    <label for="direccion-cliente" style="display: block; margin-bottom: 5px; color: #7d6870; font-size: 0.9rem;">Dirección Completa:</label>
    <input type="text" id="direccion-cliente" placeholder="Calle, Número, Colonia, CP" style="width: 100%; padding: 10px; border: 1px solid #e2d1d8; border-radius: 8px; box-sizing: border-box; outline: none;">
  </div>

  <!-- BOTÓN DE MERCADO PAGO CONECTADO -->
  <button onclick="comprarMercadoPago()" style="width: 100%; background-color: #009ee3; color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: background 0.3s;">
    Pagar con Mercado Pago
  </button>
</div>


</section>






<footer>

<h2>
VERA GLOW
</h2>

<p>
Bienestar, belleza y confianza ✨
</p>

</footer>




<script src="script.js"></script>


<script>

mostrarCarrito();


</script>



</body>

</html>
